name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --extra lint
      - run: uv run ruff check src/ tests/
      - run: uv run ruff format --check src/ tests/

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - name: Install elan
        run: curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y --default-toolchain none
      - name: Add elan to PATH
        run: echo "$HOME/.elan/bin" >> $GITHUB_PATH
      - name: Cache elan
        uses: actions/cache@v4
        with:
          path: ~/.elan
          key: elan-${{ runner.os }}-${{ hashFiles('tests/test_project/lean-toolchain') }}
          restore-keys: |
            elan-${{ runner.os }}-
      - name: Install Lean toolchain
        run: |
          TOOLCHAIN="$(cat tests/test_project/lean-toolchain)"
          elan toolchain install "$TOOLCHAIN"
          elan default "$TOOLCHAIN"
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install ripgrep
        run: sudo apt-get install -y ripgrep
      - run: uv sync --extra dev
      - run: uv run pytest tests/mcp/ -v
