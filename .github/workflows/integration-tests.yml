name: Integration Tests

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

jobs:
  integration-test:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Install elan
        run: curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y --default-toolchain none

      - name: Add elan to PATH
        run: echo "$HOME/.elan/bin" >> $GITHUB_PATH

      - name: Cache elan
        uses: actions/cache@v4
        with:
          path: ~/.elan
          key: elan-${{ runner.os }}-${{ hashFiles('tests/test_project/lean-toolchain') }}
          restore-keys: |
            elan-${{ runner.os }}-

      - name: Install Lean toolchain
        run: |
          TOOLCHAIN="$(cat tests/test_project/lean-toolchain)"
          elan toolchain install "$TOOLCHAIN"
          elan default "$TOOLCHAIN"

      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"

      - name: Install ripgrep
        run: sudo apt-get install -y ripgrep

      - name: Install Python dependencies
        run: uv sync --extra dev

      - name: Cache test project Lake artifacts
        uses: actions/cache@v4
        with:
          path: tests/test_project/.lake
          key: lake-${{ runner.os }}-${{ hashFiles('tests/test_project/lean-toolchain', 'tests/test_project/lakefile.toml', 'tests/test_project/lake-manifest.json') }}
          restore-keys: |
            lake-${{ runner.os }}-

      - name: Build test project
        working-directory: tests/test_project
        run: lake build

      - name: Run all tests
        run: uv run pytest tests/mcp -v -m "not slow" --timeout=300
